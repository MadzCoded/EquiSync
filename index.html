<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Horse Reality Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e5edff 0, #f5f5f7 45%, #f5f5f7 100%);
      color: #111827;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      max-width: 980px;
      width: 100%;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.8rem, 2.4vw, 2.3rem);
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 0;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.08);
      margin-bottom: 1.5rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem 1.1rem;
    }

    @media (max-width: 700px) {
      form {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 0.82rem;
      gap: 0.3rem;
      color: #4b5563;
    }

    input, textarea, select {
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 0.5rem 0.8rem;
      font-size: 0.95rem;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      background-color: #f9fafb;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    textarea {
      border-radius: 14px;
      min-height: 72px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
      background-color: #ffffff;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .field-row {
      display: flex;
      gap: 0.75rem;
    }

    .field-row > label {
      flex: 1;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
      grid-column: 1 / -1;
      margin-top: 0.4rem;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 0.55rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
      transition: transform 0.06s ease, box-shadow 0.06s ease, background-color 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #1d4ed8, #1d4ed8);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }
